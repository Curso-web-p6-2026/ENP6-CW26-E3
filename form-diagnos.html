<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulario Diagnóstico ETE</title>
        <style >
        </style>
    </head>
    <body>
        <h1>FORMULARIO DIAGNÓSTICO</h1>
        <form>
            <fieldset>
                <legend>DATOS PERSONALES:</legend>
                <label>Nombre:</label>
                <input type="text" name="nombre" required>
                <br>
                <label>Grupo:</label>
                <input type="text" name="grupo" required>
                <br>
                <label>Correo:</label>
                <input type="email" name="correo">
                <br>
                <label>Turno:</label>
                <br>
                <label><input type="radio" name="turno" required>Matutino</label>
                <br>
                <label><input type="radio" name="turno" required>Vespertino</label>
            </fieldset>
            <fieldset>
                <legend>PREGUNTAS SOBRE LA ETE</legend>
                <label>¿Cuál fue tu motivo para elegir el Estudio Técnico Especializado en Computación?</label>
                <input type="text" name="motivo" required>
                <br>
                <label>¿Tienes conocimientos previos sobre computación o programación?</label>
                <br>
                <label><input type="radio" name="conocimientos" required>Si</label>
                <br>
                <label><input type="radio" name="conocimientos" required>No</label>
                <br>
                <label>En el caso de que si tengas, mencionalos :</label>
                <input type="text" name="cuales-conocimientos">
                <br>
                <label>¿Trabajas?</label>
                <br>
                <label><input type="radio" name="trabajo" required>Si</label>
                <br>
                <label><input type="radio" name="trabajo" required>No</label>
                <br>
                <label>En el caso de que si tengas trabajo, este se contrapone con la ETE?(si no es tu caso selecciona no)</label>
                <br>
                <label><input type="radio" name="trabajo-ete" required>Si</label>
                <br>
                <label><input type="radio" name="trabajo-ete" required>No</label>
                <br>
                <label>¿Tienes actividades que se contrapongan con la ETE?</label>
                <br>
                <label><input type="radio" name="actividades" required>Si</label>
                <br>
                <label><input type="radio" name="actividades" required>No</label>
                <br>
                <label>En el caso de que si tengas, mencionalos:</label>
                <input type="text" name="cuales-actividades">
            </fieldset>
            <fieldset>
                <legend>PREGUNTAS SOBRE ESTUDIOS</legend>
                <label>¿Eres alumno regular?</label>
                <br>
                <label><input type="radio" name="reg" required>Si</label>
                <br>
                <label><input type="radio" name="reg" required>No</label>
                <br>
                <label>¿Conoces algún método de estudio?</label>
                <br>
                <label><input type="radio" name="metodo" required>Si</label>
                <br>
                <label><input type="radio" name="metodo" required>No</label>
                <br>
                <label>En caso de que si, menciona los que utilizas:</label>
                <input type="text" name="que-metodos"> 
                <br>
                <label>En que caso de que no, selecciona que haces para estudiar:</label>
                <select name="metodo">
                    <option value=""> - Selecciona - </option>
                    <option value="">Leer </option>
                    <option value="">Memorizar</option>
                    <option value="">Hacer ejercicios sobre el tema</option>
                    <option value="">Ver videos educativos</option>
                    <option value="">Material de apoyo</option>
                    <option value="">Cursos</option>
                </select>
                <br>
                <label>Otro:</label>
                <input type="text" name="que-metodo"> 
                <br>
                <label>Si tú método no llegase a funcionar, ¿qué haces cuando no comprendes un tema?</label>
                <input type="text" name="accion">    
            </fieldset>
        </form>
    </body>
</html>
